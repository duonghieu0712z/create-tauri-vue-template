version: 2

updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '01:30'
          timezone: Etc/UTC
      open-pull-requests-limit: 10
      groups:
          root-npm-minor-and-patch:
              update-types:
                  - minor
                  - patch

    - package-ecosystem: npm
      directory: /template
      schedule:
          interval: weekly
          day: monday
          time: '02:00'
          timezone: Etc/UTC
      open-pull-requests-limit: 10
      groups:
          template-npm-minor-and-patch:
              update-types:
                  - minor
                  - patch

    - package-ecosystem: cargo
      directory: /template/src-tauri
      schedule:
          interval: weekly
          day: monday
          time: '02:30'
          timezone: Etc/UTC
      open-pull-requests-limit: 10
      groups:
          template-cargo-minor-and-patch:
              update-types:
                  - minor
                  - patch

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '03:00'
          timezone: Etc/UTC

    - package-ecosystem: github-actions
      directory: /template
      schedule:
          interval: weekly
          day: monday
          time: '03:30'
          timezone: Etc/UTC
